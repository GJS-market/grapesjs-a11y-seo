name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Coverage report
        run: npm run coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
      - name: Build
        run: npm run build
      - name: Bundle smoke test
        run: |
          test -f dist/index.js || { echo "dist/index.js missing"; exit 1; }
          grep -q "grapesjsA11ySeo" dist/index.js || { echo "UMD global grapesjsA11ySeo missing"; exit 1; }
          echo "dist/index.js exposes grapesjsA11ySeo"
      - name: Package contents
        run: npm pack --dry-run

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E tests
        run: npm run test:e2e
